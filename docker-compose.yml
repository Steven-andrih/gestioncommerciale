services:
  mysqldb: # soloina anaty persistance
    image: mysql:8.0
    container_name: mysql_erp
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mini_erp
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
  tomcat:
    build: .
    container_name: tomcat
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      - mysqldb
volumes:
  mysql-data:
